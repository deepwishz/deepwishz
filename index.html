<!DOCTYPE html>
<html>
<head>
  <title>Navbar</title>
  <link rel="stylesheet" href="./style.css">
  
  <style>
    body {
      margin: 0;
      font-family: Arial;
    }

    .navbar {
      background-color: black;
      overflow: hidden;
    }

    .navbar a {
      float: left;
      color: white;
      text-decoration: none;
      padding: 14px 20px;
    }

    .navbar a:hover {
      background-color: gray;
    }
  </style>
</head>

<body>

  <div class="navbar">
    <a href="#">Home</a>
    <a href="#">About</a>
    <a href="#">Contact</a>
  </div>

</body>
</html>
