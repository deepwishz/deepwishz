<!DOCTYPE html>
<html>
<head>
  <title>Navbar</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #fff0f5;
    }

    .navbar {
      display: flex;
      justify-content: center;
      gap: 30px;
      background: pink;
      padding: 15px;
    }

    .navbar a {
      color: white;
      text-decoration: none;
      font-weight: bold;
    }
  </style>

</head>

<body>

  <div class="navbar">
    <a href="#">Home</a>
    <a href="#">About</a>
    <a href="#">Contact</a>
  </div>

</body>
</html>
